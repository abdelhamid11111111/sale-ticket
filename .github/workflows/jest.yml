name: Jest Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  jest:
    name: Run Jest Tests
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run unit tests
        run: npx jest --testPathPatterns=unit --ci --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Run integration tests
        run: npx jest --testPathPatterns=integration --ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-coverage
          path: coverage/
          retention-days: 7